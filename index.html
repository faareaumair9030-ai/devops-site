<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Agile Plan Generator</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Space+Mono&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #080808;
      --surface: #111;
      --border: #222;
      --text: #e8e8e8;
      --muted: #555;
      --accent: #a3e635;
      --accent2: #f97316;
      --sans: 'Syne', sans-serif;
      --mono: 'Space Mono', monospace;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; }

    header {
      padding: 48px 6vw 36px;
      border-bottom: 1px solid var(--border);
      max-width: 860px;
      margin: 0 auto;
    }

    .badge {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.15em;
      color: var(--accent);
      border: 1px solid var(--accent);
      padding: 3px 10px;
      display: inline-block;
      margin-bottom: 20px;
    }

    h1 {
      font-size: clamp(2rem, 5vw, 3.6rem);
      font-weight: 800;
      line-height: 1.05;
      letter-spacing: -0.02em;
      margin-bottom: 12px;
    }

    h1 span { color: var(--accent); }

    .tagline { color: var(--muted); font-size: 14px; font-family: var(--mono); }

    main { max-width: 860px; margin: 0 auto; padding: 40px 6vw 80px; }

    /* FORM */
    .form-card {
      border: 1px solid var(--border);
      padding: 32px;
      margin-bottom: 32px;
      background: var(--surface);
    }

    .form-title {
      font-size: 11px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--accent2);
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .form-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 16px;
    }

    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group.full { grid-column: 1 / -1; }

    label {
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      font-family: var(--mono);
    }

    input, textarea, select {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--mono);
      font-size: 13px;
      padding: 10px 14px;
      outline: none;
      transition: border-color 0.2s;
      width: 100%;
    }

    input:focus, textarea:focus, select:focus { border-color: var(--accent); }
    textarea { resize: vertical; min-height: 90px; line-height: 1.6; }
    select option { background: #111; }

    .generate-btn {
      width: 100%;
      padding: 16px;
      background: var(--accent);
      color: #000;
      border: none;
      font-family: var(--sans);
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 8px;
    }

    .generate-btn:hover { background: #bef264; }
    .generate-btn:disabled { background: #2a2a2a; color: var(--muted); cursor: not-allowed; }

    /* OUTPUT */
    #output { display: none; }

    .output-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }

    .output-header h2 {
      font-size: 1.4rem;
      font-weight: 800;
      letter-spacing: -0.01em;
    }

    .output-header h2 span { color: var(--accent); }

    /* SPRINT CARDS */
    .sprints-grid { display: flex; flex-direction: column; gap: 12px; margin-bottom: 24px; }

    .sprint-card {
      border: 1px solid var(--border);
      background: var(--surface);
      overflow: hidden;
    }

    .sprint-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      user-select: none;
    }

    .sprint-header:hover { background: #181818; }

    .sprint-num {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--accent);
      letter-spacing: 0.1em;
    }

    .sprint-name {
      font-size: 14px;
      font-weight: 700;
      flex: 1;
      margin: 0 14px;
    }

    .sprint-duration {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
    }

    .sprint-body { padding: 16px 18px; display: none; }
    .sprint-body.open { display: block; }

    .task-list { list-style: none; display: flex; flex-direction: column; gap: 8px; }

    .task-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      font-size: 13px;
      color: #b0b0b0;
      font-family: var(--mono);
      line-height: 1.5;
    }

    .task-item::before {
      content: '→';
      color: var(--accent);
      flex-shrink: 0;
      margin-top: 1px;
    }

    .sprint-goal {
      margin-top: 12px;
      padding: 10px 14px;
      border-left: 2px solid var(--accent2);
      font-size: 12px;
      color: var(--muted);
      font-family: var(--mono);
      background: rgba(249,115,22,0.05);
    }

    /* SUMMARY BOXES */
    .summary-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
      margin-bottom: 24px;
    }

    .summary-box {
      border: 1px solid var(--border);
      padding: 16px;
      background: var(--surface);
    }

    .summary-label {
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      font-family: var(--mono);
      margin-bottom: 6px;
    }

    .summary-value {
      font-size: 1.5rem;
      font-weight: 800;
      color: var(--accent);
    }

    .summary-sub { font-size: 12px; color: var(--muted); margin-top: 4px; font-family: var(--mono); }

    /* LOADING */
    .loading-box {
      border: 1px solid var(--border);
      padding: 48px 32px;
      text-align: center;
      background: var(--surface);
      display: none;
    }

    .loading-box.active { display: block; }

    .loader {
      display: inline-block;
      width: 32px;
      height: 32px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-bottom: 16px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-text { font-family: var(--mono); font-size: 13px; color: var(--muted); }
    .loading-text span { color: var(--accent); }

    .error-box {
      border: 1px solid #7f1d1d;
      background: rgba(127,29,29,0.15);
      padding: 16px 20px;
      color: #fca5a5;
      font-family: var(--mono);
      font-size: 13px;
      display: none;
      margin-bottom: 16px;
    }

    .error-box.active { display: block; }

    @media (max-width: 600px) {
      .form-grid { grid-template-columns: 1fr; }
      .form-group.full { grid-column: 1; }
    }
  </style>
</head>
<body>

<header>
  <div class="badge">// AI-Powered</div>
  <h1>Agile Plan<br/><span>Generator</span></h1>
  <p class="tagline">Enter your project → get a full AI-generated Agile plan</p>
</header>

<main>

  <!-- INPUT FORM -->
  <div class="form-card">
    <div class="form-title">Project Details</div>
    <div class="form-grid">
      <div class="form-group">
        <label>Project Name</label>
        <input type="text" id="proj-name" placeholder="e.g. Online Food Ordering App"/>
      </div>
      <div class="form-group">
        <label>Team Size</label>
        <select id="team-size">
          <option value="1-2">1–2 developers</option>
          <option value="3-5" selected>3–5 developers</option>
          <option value="6-10">6–10 developers</option>
          <option value="10+">10+ developers</option>
        </select>
      </div>
      <div class="form-group">
        <label>Project Duration</label>
        <select id="duration">
          <option value="1 month">1 month</option>
          <option value="2 months">2 months</option>
          <option value="3 months" selected>3 months</option>
          <option value="6 months">6 months</option>
          <option value="1 year">1 year</option>
        </select>
      </div>
      <div class="form-group">
        <label>Project Type</label>
        <select id="proj-type">
          <option value="web app">Web App</option>
          <option value="mobile app">Mobile App</option>
          <option value="e-commerce">E-Commerce</option>
          <option value="API / backend">API / Backend</option>
          <option value="dashboard">Dashboard</option>
          <option value="other">Other</option>
        </select>
      </div>
      <div class="form-group full">
        <label>Project Description</label>
        <textarea id="proj-desc" placeholder="Describe what the project does, who it's for, and any key features you need..."></textarea>
      </div>
    </div>
    <button class="generate-btn" id="gen-btn" onclick="generatePlan()">Generate Agile Plan →</button>
  </div>

  <!-- LOADING -->
  <div class="loading-box" id="loading-box">
    <div class="loader"></div>
    <div class="loading-text">Generating your <span>Agile plan</span>...</div>
  </div>

  <!-- ERROR -->
  <div class="error-box" id="error-box"></div>

  <!-- OUTPUT -->
  <div id="output">
    <div class="output-header">
      <h2>Your <span id="out-name">Project</span> Plan</h2>
    </div>
    <div class="summary-grid" id="summary-grid"></div>
    <div class="sprints-grid" id="sprints-grid"></div>
  </div>

</main>

<script>
async function generatePlan() {
  const name = document.getElementById('proj-name').value.trim();
  const desc = document.getElementById('proj-desc').value.trim();
  const team = document.getElementById('team-size').value;
  const duration = document.getElementById('duration').value;
  const type = document.getElementById('proj-type').value;

  if (!name || !desc) {
    showError('Please enter a project name and description.');
    return;
  }

  setLoading(true);
  hideError();
  document.getElementById('output').style.display = 'none';

  const prompt = `You are an expert Agile project manager. Generate a complete Agile plan for the following project.

Project Name: ${name}
Project Type: ${type}
Team Size: ${team}
Duration: ${duration}
Description: ${desc}

Return ONLY a valid JSON object with this exact structure, no extra text:
{
  "summary": {
    "total_sprints": <number>,
    "sprint_length": "2 weeks",
    "team_size": "${team}",
    "total_duration": "${duration}"
  },
  "sprints": [
    {
      "sprint_number": 1,
      "name": "<sprint name>",
      "goal": "<one sentence sprint goal>",
      "tasks": ["<task 1>", "<task 2>", "<task 3>", "<task 4>"]
    }
  ]
}

Generate realistic sprints that cover: planning, design, development, testing, deployment, and maintenance. Each sprint should have 4-5 tasks. Make it specific to the project described.`;

  try {
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 2000,
        messages: [{ role: "user", content: prompt }]
      })
    });

    const data = await response.json();

    if (!response.ok) {
      throw new Error(data.error?.message || 'API error');
    }

    const text = data.content[0].text;
    const clean = text.replace(/```json|```/g, '').trim();
    const plan = JSON.parse(clean);

    renderPlan(name, plan);

  } catch (err) {
    showError('Something went wrong: ' + err.message);
  } finally {
    setLoading(false);
  }
}

function renderPlan(name, plan) {
  document.getElementById('out-name').textContent = name;

  // Summary boxes
  const s = plan.summary;
  document.getElementById('summary-grid').innerHTML = `
    <div class="summary-box">
      <div class="summary-label">Total Sprints</div>
      <div class="summary-value">${s.total_sprints}</div>
      <div class="summary-sub">sprints planned</div>
    </div>
    <div class="summary-box">
      <div class="summary-label">Sprint Length</div>
      <div class="summary-value">2</div>
      <div class="summary-sub">weeks each</div>
    </div>
    <div class="summary-box">
      <div class="summary-label">Team Size</div>
      <div class="summary-value">${s.team_size.split('-')[0]}</div>
      <div class="summary-sub">${s.team_size} devs</div>
    </div>
    <div class="summary-box">
      <div class="summary-label">Duration</div>
      <div class="summary-value">${s.total_duration.split(' ')[0]}</div>
      <div class="summary-sub">${s.total_duration}</div>
    </div>
  `;

  // Sprint cards
  const container = document.getElementById('sprints-grid');
  container.innerHTML = plan.sprints.map((sprint, i) => `
    <div class="sprint-card">
      <div class="sprint-header" onclick="toggleSprint(${i})">
        <span class="sprint-num">SPRINT ${sprint.sprint_number}</span>
        <span class="sprint-name">${sprint.name}</span>
        <span class="sprint-duration">2 weeks</span>
      </div>
      <div class="sprint-body ${i === 0 ? 'open' : ''}" id="sprint-body-${i}">
        <ul class="task-list">
          ${sprint.tasks.map(t => `<li class="task-item">${t}</li>`).join('')}
        </ul>
        <div class="sprint-goal">Goal: ${sprint.goal}</div>
      </div>
    </div>
  `).join('');

  document.getElementById('output').style.display = 'block';
  document.getElementById('output').scrollIntoView({ behavior: 'smooth' });
}

function toggleSprint(i) {
  const body = document.getElementById('sprint-body-' + i);
  body.classList.toggle('open');
}

function setLoading(active) {
  document.getElementById('loading-box').classList.toggle('active', active);
  document.getElementById('gen-btn').disabled = active;
  document.getElementById('gen-btn').textContent = active ? 'Generating...' : 'Generate Agile Plan →';
}

function showError(msg) {
  const el = document.getElementById('error-box');
  el.textContent = '⚠ ' + msg;
  el.classList.add('active');
}

function hideError() {
  document.getElementById('error-box').classList.remove('active');
}
</script>

</body>
</html>
